<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ITZFIZZ - Sky Journey</title>
    <script src="tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
</head>
<body class="overflow-x-hidden">

    <!-- Scroll Driver -->
    <div id="scroll-container" class="relative w-full bg-mist" style="height: 700vh;">
        
        <!-- Fixed Viewport -->
        <div id="viewport" class="fixed top-0 left-0 w-full h-screen overflow-hidden">
            
            <!-- LAYER 1: FINAL BACKGROUND IMAGE (The Last Reveal) -->
            <div id="nature-bg" class="absolute inset-0 z-0 scale-125">
                <!-- HIGH QUALITY RELIABLE IMAGE -->
                <img 
                    src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?q=80&w=2070&auto=format&fit=crop" 
                    alt="Mountain Landscape" 
                    class="w-full h-full object-cover opacity-0"
                >
                <div id="vignette" class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-transparent opacity-0"></div>
            </div>

            <!-- LAYER 2: SINGLE CLOUD VIDEO (Middle Part) -->
            <div id="cloud-video" class="absolute inset-0 z-20 overflow-hidden">
                <video class="cloud-video" autoplay muted loop playsinline aria-hidden="true">
                    <source src="clouds.mp4" type="video/mp4">
                </video>
            </div>

            <!-- LAYER 3: UI ELEMENTS -->
            
            <!-- Birds -->
            <div class="bird-real w-32 h-20 top-[10%] left-[-20%] z-30" id="bird-1"></div>
            <div class="bird-real w-24 h-16 top-[25%] right-[-20%] z-30 transform -scale-x-100" id="bird-2"></div>
            <div class="bird-real w-16 h-10 top-[15%] left-[-30%] z-25 opacity-70" id="bird-3"></div>

            <!-- Hanging Cards -->
            <div class="hanging-card-container" id="card-group-1">
                <div class="rope"></div>
                <div class="stat-card bg-white/95 border border-stone-200 rounded-2xl p-8 shadow-2xl w-64 text-center backdrop-blur-sm">
                    <h3 class="text-5xl font-display font-bold text-emerald-700">95%</h3>
                    <p class="text-stone-500 mt-2 uppercase tracking-wider text-xs font-semibold">Success Rate</p>
                </div>
            </div>

            <div class="hanging-card-container" id="card-group-2">
                <div class="rope"></div>
                <div class="stat-card bg-white/95 border border-stone-200 rounded-2xl p-8 shadow-2xl w-64 text-center backdrop-blur-sm">
                    <h3 class="text-5xl font-display font-bold text-sky-700">10K+</h3>
                    <p class="text-stone-500 mt-2 uppercase tracking-wider text-xs font-semibold">Active Users</p>
                </div>
            </div>

            <div class="hanging-card-container" id="card-group-3">
                <div class="rope"></div>
                <div class="stat-card bg-white/95 border border-stone-200 rounded-2xl p-8 shadow-2xl w-64 text-center backdrop-blur-sm">
                    <h3 class="text-5xl font-display font-bold text-amber-700">24/7</h3>
                    <p class="text-stone-500 mt-2 uppercase tracking-wider text-xs font-semibold">Support</p>
                </div>
            </div>

            <div class="hanging-card-container" id="card-group-4">
                <div class="rope"></div>
                <div class="stat-card bg-white/95 border border-stone-200 rounded-2xl p-8 shadow-2xl w-64 text-center backdrop-blur-sm">
                    <h3 class="text-5xl font-display font-bold text-teal-700">50+</h3>
                    <p class="text-stone-500 mt-2 uppercase tracking-wider text-xs font-semibold">Global Clients</p>
                </div>
            </div>


            <!-- LAYER 4: INITIAL FOG (Start Part) -->
            <div id="initial-fog" class="absolute inset-0 z-50 opacity-100 pointer-events-none overflow-hidden">
                <div class="absolute inset-0 bg-white"></div>
                
                <!-- Real Fog Image Layer 1 -->
                <img src="https://images.unsplash.com/photo-1483921020237-2ff51e8e4b22?q=80&w=2000&auto=format&fit=crop" 
                     class="absolute inset-0 w-full h-full object-cover opacity-90"
                     style="filter: brightness(1.2) contrast(0.9);">
                
                <!-- Real Fog Image Layer 2 (Parallax) -->
                 <img src="https://images.unsplash.com/photo-1483921020237-2ff51e8e4b22?q=80&w=2000&auto=format&fit=crop" 
                     class="absolute inset-0 w-[120%] h-[120%] object-cover opacity-60 transform -translate-x-10"
                     style="filter: brightness(1.1);">
            </div>

            <!-- LAYER 5: INTRO TEXT -->
            <div id="intro-text" class="absolute inset-0 z-[60] flex flex-col items-center justify-center text-center px-4">
                <h2 class="text-lg md:text-2xl font-body font-light text-gray-600 tracking-[0.3em] uppercase mb-4">
                    Begin your journey with
                </h2>
                <h1 class="font-display text-6xl md:text-9xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-emerald-800 via-teal-600 to-sky-700">
                    ITZFIZZ
                </h1>
            </div>

            <!-- FINAL REVEAL -->
            <div id="final-reveal" class="absolute inset-0 z-[70] flex flex-col items-center justify-center opacity-0 pointer-events-none px-4">
                <h1 class="font-display text-5xl md:text-8xl font-bold text-white tracking-[0.15em] text-center leading-tight">
                    W E L C O M E<br>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-emerald-300 via-teal-300 to-sky-300">
                        I T Z F I Z Z
                    </span>
                </h1>
                <p class="mt-6 text-lg text-white/80 tracking-[0.2em] uppercase font-body">
                    Crafting digital experiences that feel alive.
                </p>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
